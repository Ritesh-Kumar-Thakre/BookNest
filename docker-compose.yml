services:
  # ─── RabbitMQ ─────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Service Registry ─────────────────────────────
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      - JAVA_TOOL_OPTIONS="-Xms64m -Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── API Gateway ───────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - JAVA_TOOL_OPTIONS="-Xms64m -Xmx256m"
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy

  # ─── Auth Service ──────────────────────────────────
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - JAVA_TOOL_OPTIONS="-Xms64m -Xmx256m"
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/booknest_auth?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy

  # ─── Book Service ──────────────────────────────────
  book-service:
    build: ./book-service
    ports:
      - "8082:8082"
    environment:
      - JAVA_TOOL_OPTIONS="-Xms64m -Xmx256m"
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/booknest_book?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy

  # ─── Cart Service ──────────────────────────────────
  cart-service:
