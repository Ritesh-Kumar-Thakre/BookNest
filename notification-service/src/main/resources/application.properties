spring.application.name=notification-service

# =========================
# Server
server.port=8088

# =========================
# Database
spring.datasource.url=jdbc:mysql://localhost:3307/booknest_notification
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.hikari.maximum-pool-size=5

# =========================
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

# =========================================
# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ========
# Jwt
jwt.secret=MySuperSecure256BitSecretKeyForJwtSigning123456789
jwt.expiration=86400000

# ========
# Email (Gmail SMTP)
notification.email.enabled=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:riteshthakre976@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========
# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# ========
# Actuator
management.endpoints.web.exposure.include=health,info
