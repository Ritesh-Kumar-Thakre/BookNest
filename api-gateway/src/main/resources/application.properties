spring.application.name=api-gateway
server.port=8080

# =========================
# Eureka
# =========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# =========================
# JWT
# =========================
jwt.secret=MySuperSecure256BitSecretKeyForJwtSigning123456789

# =========================
# Gateway Routes
# =========================

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

# Book Service
spring.cloud.gateway.routes[1].id=book-service
spring.cloud.gateway.routes[1].uri=lb://book-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/books/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

# Cart Service
spring.cloud.gateway.routes[2].id=cart-service
spring.cloud.gateway.routes[2].uri=lb://cart-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/cart/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2

# Order Service
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/orders/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2

# Wallet Service
spring.cloud.gateway.routes[4].id=wallet-service
spring.cloud.gateway.routes[4].uri=lb://wallet-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/wallet/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2

# Review Service
spring.cloud.gateway.routes[5].id=review-service
spring.cloud.gateway.routes[5].uri=lb://review-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/reviews/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=2

# Wishlist Service
spring.cloud.gateway.routes[6].id=wishlist-service
spring.cloud.gateway.routes[6].uri=lb://wishlist-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/wishlist/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=2

# Notification Service
spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/notifications/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=2

# =========================
# Actuator
# =========================
management.endpoints.web.exposure.include=health,info

# =========================
# File Upload Size
# =========================
spring.codec.max-in-memory-size=20MB
spring.cloud.gateway.httpclient.response-timeout=30s
